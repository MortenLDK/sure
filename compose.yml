# Kirkvik Family Finance — Docker Compose
#
# For production deployment, use Kamal: kamal deploy
# This compose.yml is used for:
#   1. Local development: docker compose up -d
#   2. Backup service on droplet: docker compose --profile backup up -d
#
# Based on compose.example.yml with Kirkvik-specific configuration.
# See DIVERGENCE.md for a summary of changes from the Sure upstream.

x-db-env: &db_env
  POSTGRES_USER: ${POSTGRES_USER:-sure_user}
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
  POSTGRES_DB: ${POSTGRES_DB:-sure_production}

x-rails-env: &rails_env
  <<: *db_env
  SECRET_KEY_BASE: ${SECRET_KEY_BASE}
  SELF_HOSTED: "true"
  RAILS_FORCE_SSL: "true"
  RAILS_ASSUME_SSL: "true"
  APP_DOMAIN: "${APP_DOMAIN:-frihetsformuen.no}"
  DB_HOST: db
  DB_PORT: 5432
  REDIS_URL: redis://redis:6379/1
  TZ: "Europe/Oslo"
  # Optional: OpenAI for AI chat features (Phase 9)
  OPENAI_ACCESS_TOKEN: ${OPENAI_ACCESS_TOKEN}

services:
  web:
    image: ghcr.io/we-promise/sure:stable
    volumes:
      - app-storage:/rails/storage
    ports:
      - ${PORT:-3000}:3000
    restart: unless-stopped
    environment:
      <<: *rails_env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    dns:
      - 8.8.8.8
      - 1.1.1.1
    networks:
      - sure_net

  worker:
    image: ghcr.io/we-promise/sure:stable
    command: bundle exec sidekiq
    volumes:
      - app-storage:/rails/storage
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    dns:
      - 8.8.8.8
      - 1.1.1.1
    environment:
      <<: *rails_env
    networks:
      - sure_net

  db:
    image: postgres:16
    restart: unless-stopped
    volumes:
      # IMPORTANT: path must end in /data — not just /postgresql
      # See DIVERGENCE.md — Pitfall 1 in 01-RESEARCH.md explains why
      - postgres-data:/var/lib/postgresql/data
    environment:
      <<: *db_env
      TZ: "Europe/Oslo"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB" ]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - sure_net

  backup:
    profiles:
      - backup
    image: prodrigestivill/postgres-backup-local
    restart: unless-stopped
    volumes:
      - /opt/sure-data/backups:/backups
    environment:
      - POSTGRES_HOST=db
      - POSTGRES_DB=${POSTGRES_DB:-sure_production}
      - POSTGRES_USER=${POSTGRES_USER:-sure_user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - SCHEDULE=@daily
      - BACKUP_KEEP_DAYS=30
      - BACKUP_KEEP_WEEKS=4
      - BACKUP_KEEP_MONTHS=6
    depends_on:
      - db
    networks:
      - sure_net

  redis:
    # Pinned to redis:7-alpine — never use redis:latest (may jump to Redis 8 with breaking changes)
    image: redis:7-alpine
    restart: unless-stopped
    # maxmemory 256mb: prevents OOM on 4GB droplet
    # appendonly yes: data persists across container restarts
    # mem_limit 512m: Docker-level hard cap as a safety net
    command: >
      redis-server
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
      --appendfsync everysec
    mem_limit: 512m
    volumes:
      - redis-data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - sure_net

volumes:
  app-storage:
  postgres-data:
  redis-data:

networks:
  sure_net:
    driver: bridge
